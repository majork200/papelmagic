<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Papelaria Abracadabra</title>

  <!-- Fonte estilo western / jogo -->
  <link href="https://fonts.googleapis.com/css2?family=Rye&family=Special+Elite&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Special Elite', cursive;
      background: #eaeaea;
      color: #111;
      text-align: center;
    }

    header {
      padding: 30px 10px;
    }

    header h1 {
      font-family: 'Rye', serif;
      font-size: 48px;
      letter-spacing: 3px;
      margin: 0;
    }

    header p {
      margin-top: 5px;
      font-size: 14px;
      letter-spacing: 2px;
    }

    .banner {
      display: inline-block;
      background: black;
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      margin: 20px auto;
      font-size: 18px;
    }

    .produtos {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: white;
      border: 2px dashed black;
      padding: 15px;
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .card img {
      width: 100%;
      filter: grayscale(100%);
    }

    .preco {
      font-size: 18px;
      margin: 10px 0;
    }

    button {
      background: black;
      color: white;
      border: none;
      padding: 10px;
      cursor: pointer;
      font-family: 'Special Elite', cursive;
    }

    footer {
      margin-top: 30px;
      padding: 20px;
      font-size: 12px;
    }
  </style>
</head>
<body>

<header>
  <h1>PAPELARIA ABRACADABRA</h1>
  <p>SCRAPBOOK ONLINE</p>
</header>

<div class="banner">
  ✦ Novas coleções mágicas disponíveis! ✦
</div>

<section class="produtos">

  <div class="card">
    <img src="../img/cad.png" alt="Produto">
    <h3>Kit Scrapbook Vintage</h3>
    <div class="preco">R$ 39,90</div>
    <button>Comprar</button>
  </div>

  <div class="card">
    <img src="../img/kitP.png" alt="Produto">
    <h3>Adesivos Mágicos</h3>
    <div class="preco">R$ 14,90</div>
    <button>Comprar</button>
  </div>

  <div class="card">
    <img src="../img/marC.png" alt="Produto">
    <h3>Papéis Antigos</h3>
    <div class="preco">R$ 19,90</div>
    <button>Comprar</button>
  </div>

</section>

<footer>
  © 2026 Papelaria Abracadabra ✦ Todos os direitos reservados
</footer>

</body>
</html>
